name: Terraform Drift Detection

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'   # runs daily

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Day-8

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # 3️⃣ Configure AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # 4️⃣ Terraform Init (important fix)
      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      # 5️⃣ Terraform Plan (Drift Detection ✅ FIXED)
      - name: Terraform Plan (Drift Detection)
        id: plan
        run: |
          set +e

          terraform plan \
            -detailed-exitcode \
            -refresh=true \
            -no-color > plan.txt

          EXIT_CODE=$?

          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 2 ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

          exit 0

      #  DRIFT ALERT
      - name: Slack Alert (Drift Detected)
        if: steps.plan.outputs.drift == 'true'
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{
            \"text\": \" *Terraform Drift Detected!*\nRepo: $GITHUB_REPOSITORY\nBranch: $GITHUB_REF_NAME\nRun: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\n\n$(head -n 20 plan.txt)\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  NO DRIFT ALERT
      - name: Slack Alert (No Drift)
        if: steps.plan.outputs.drift == 'false'
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{
            \"text\": \" No Terraform drift detected.\nRepo: $GITHUB_REPOSITORY\nBranch: $GITHUB_REF_NAME\"
          }" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
