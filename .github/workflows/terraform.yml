name: Terraform Drift Detection

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'   # runs daily

jobs:
  terraform:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Day-8

    steps:
      #  Checkout code
      - name: Checkout code
        uses: actions/checkout@v3

      # ⚙️ Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      #  Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      #  Initialize Terraform
      - name: Terraform Init
        run: terraform init -input=false

      #  Drift Detection (FIXED VERSION)
      - name: Terraform Plan (Drift Detection)
        id: plan
        run: |
          set +e

          echo " Refreshing state..."
          terraform refresh -no-color

          echo " Running terraform plan..."
          terraform plan -detailed-exitcode -no-color > plan.txt
          EXIT_CODE=$?

          echo "Exit Code: $EXIT_CODE"
          echo "exitcode=$EXIT_CODE" >> $GITHUB_OUTPUT

          if [ $EXIT_CODE -eq 2 ]; then
            echo "drift=true" >> $GITHUB_OUTPUT
          else
            echo "drift=false" >> $GITHUB_OUTPUT
          fi

          echo "------ PLAN OUTPUT ------"
          head -n 20 plan.txt

          exit 0

      #  Slack Alert (Drift Detected)
      - name: Slack Alert (Drift Detected)
        if: steps.plan.outputs.drift == 'true'
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\" *Terraform Drift Detected!*\nRepo: $GITHUB_REPOSITORY\nBranch: $GITHUB_REF_NAME\nRun: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}

      #  Slack Alert (No Drift)
      - name: Slack Alert (No Drift)
        if: steps.plan.outputs.drift == 'false'
        run: |
          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\" *No Terraform drift detected*\nRepo: $GITHUB_REPOSITORY\nBranch: $GITHUB_REF_NAME\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
